agents:
  ac_chief_investor:
    command: ac_chief_investor
    title: Chief Investor
    team: leadership
    capabilities:
      - delegation
      - executive-decision
      - synthesis
      - portfolio-review
      - cross-strategy-allocation
    expertise: >
      First-contact investment lead and final internal decision maker. Good for
      reviewing what changed, synthesizing recommendations across horizons,
      resolving conflicts between strategies, prioritizing ideas, and preparing
      a concise approval queue for the user.

  ac_swing_trader:
    command: ac_swing_trader
    title: Swing Trader
    team: investing
    manager: ac_chief_investor
    capabilities:
      - swing-trading
      - technical-analysis
      - catalyst-trading
      - entry-exit-planning
    expertise: >
      Specialist in 2-10 day US equity swing trades. Good for momentum setups,
      breakouts, reversals, short-term catalysts, and defining entries, stops,
      targets, and invalidation levels.

  ac_position_trader:
    command: ac_position_trader
    title: Position Trader
    team: investing
    manager: ac_chief_investor
    capabilities:
      - position-trading
      - trend-following
      - sector-rotation
      - medium-term-planning
    expertise: >
      Specialist in 1-6 week US equity trades. Good for trend continuation,
      post-earnings drift, rotation themes, medium-term setups, and managing
      trades over a multi-week horizon.

  ac_long_term_investor:
    command: ac_long_term_investor
    title: Long-Term Investor
    team: investing
    manager: ac_chief_investor
    capabilities:
      - long-term-investing
      - thesis-development
      - valuation-awareness
      - accumulation-planning
    expertise: >
      Specialist in longer-horizon investing ideas. Good for durable thesis
      building, business quality evaluation, accumulation plans, multi-month to
      multi-year holdings, and distinguishing investment theses from shorter
      trades.

  ac_risk_manager:
    command: ac_risk_manager
    title: Risk Manager
    team: risk
    manager: ac_chief_investor
    capabilities:
      - risk-review
      - position-sizing
      - drawdown-control
      - event-risk
      - portfolio-constraints
    expertise: >
      Independent risk reviewer. Good for challenging assumptions, enforcing
      portfolio limits, checking event and liquidity risk, validating sizing,
      and recommending whether a proposed trade should proceed to approval.

  ac_market_researcher:
    command: ac_market_researcher
    title: Market Researcher
    team: research
    manager: ac_chief_investor
    capabilities:
      - market-research
      - catalysts
      - earnings-review
      - news-analysis
      - options-signal-analysis
    expertise: >
      Generalist market researcher. Good for earnings context, macro and sector
      developments, filings, news flow, and interpreting options activity only
      as a supporting signal for US equity ideas.

  ac_software_engineer:
    command: ac_software_engineer
    title: Software Engineer
    team: engineering
    manager: ac_chief_investor
    capabilities:
      - data-pipelines
      - ibkr-integration
      - backtesting
      - journaling
      - reporting
      - automation
    expertise: >
      Technical owner for the investment system infrastructure. Good for market
      data services, scans, scoring pipelines, IBKR paper-trading integration,
      dashboards, journals, audit trails, and tooling that supports the agents.

topics:
  review:
    default: ac_chief_investor
    agents:
      - ac_chief_investor
      - ac_risk_manager
      - ac_market_researcher

  swing:
    default: ac_swing_trader
    agents:
      - ac_swing_trader
      - ac_market_researcher
      - ac_risk_manager

  position:
    default: ac_position_trader
    agents:
      - ac_position_trader
      - ac_market_researcher
      - ac_risk_manager

  long_term:
    default: ac_long_term_investor
    agents:
      - ac_long_term_investor
      - ac_market_researcher
      - ac_risk_manager

  risk:
    default: ac_risk_manager
    agents:
      - ac_risk_manager
      - ac_chief_investor

  research:
    default: ac_market_researcher
    agents:
      - ac_market_researcher
      - ac_swing_trader
      - ac_position_trader
      - ac_long_term_investor

  engineering:
    default: ac_software_engineer
    agents:
      - ac_software_engineer
      - ac_chief_investor

groups:
  investment_committee:
    - ac_chief_investor
    - ac_risk_manager
    - ac_swing_trader
    - ac_position_trader
    - ac_long_term_investor

  strategy_desk:
    - ac_swing_trader
    - ac_position_trader
    - ac_long_term_investor
    - ac_market_researcher

routing: flat
skill: skills/agent-comms/SKILL.md
max_messages: 12
scatter_timeout: 120
